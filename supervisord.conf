[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[program:warp-svc]
command=/usr/local/bin/warp-svc-wrapper
autostart=true
autorestart=true
startsecs=2
priority=10
stopsignal=TERM
stopwaitsecs=30
killasgroup=true
stdout_logfile=/dev/null
stdout_logfile_maxbytes=0
stderr_logfile=/dev/null
stderr_logfile_maxbytes=0

[program:warp-bootstrap]
command=/usr/local/bin/warp-bootstrap
autostart=true
autorestart=unexpected
exitcodes=0
startsecs=0
priority=20
stopsignal=TERM
stopwaitsecs=30
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:warp-socat]
command=/usr/local/bin/warp-socat
autostart=true
autorestart=true
startsecs=1
priority=30
stopsignal=TERM
stopwaitsecs=30
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
